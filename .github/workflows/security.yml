name: Security

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run weekly security checks on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Dependency Review
      uses: actions/dependency-review-action@v3
      with:
        fail-on-severity: moderate
        allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'typescript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql-config.yml

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      run: npm audit --audit-level=high
      continue-on-error: true

    - name: Generate audit report
      run: |
        npm audit --audit-level=high --json > npm-audit-report.json
        if [ -s npm-audit-report.json ]; then
          echo "Vulnerabilities found. Check npm-audit-report.json"
          exit 1
        fi

    - name: Upload audit report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: npm-audit-report
        path: npm-audit-report.json

  contract-security:
    name: Smart Contract Security
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Slither
      run: |
        python3 -m pip install --upgrade pip
        pip install slither-analyzer

    - name: Run Slither analysis
      run: |
        slither contracts/ --exclude-dependencies --exclude-informational --json slither-report.json
      continue-on-error: true

    - name: Upload Slither report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: slither-report
        path: slither-report.json

    - name: Check for high severity issues
      run: |
        if [ -f slither-report.json ]; then
          high_issues=$(cat slither-report.json | jq '. | length')
          if [ "$high_issues" -gt 0 ]; then
            echo "High severity issues found in smart contracts"
            exit 1
          fi
        fi

  license-check:
    name: License Compatibility Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check licenses
      run: |
        npx license-checker --production --json > licenses.json
        # Check for incompatible licenses
        incompatible=$(cat licenses.json | jq 'to_entries[] | select(.value.license | IN("GPL", "GPL-2.0", "GPL-3.0", "LGPL", "LGPL-2.1", "LGPL-3.0")) | .key')
        if [ -n "$incompatible" ]; then
          echo "Incompatible licenses found:"
          echo "$incompatible"
          exit 1
        fi

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run GitLeaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        config-path: .gitleaks.toml

  notification:
    name: Security Notification
    runs-on: ubuntu-latest
    needs: [dependency-review, codeql-analysis, vulnerability-scan, npm-audit, contract-security, license-check, secrets-scan]
    if: always() && (needs.dependency-review.result == 'failure' || needs.codeql-analysis.result == 'failure' || needs.vulnerability-scan.result == 'failure' || needs.npm-audit.result == 'failure' || needs.contract-security.result == 'failure' || needs.license-check.result == 'failure' || needs.secrets-scan.result == 'failure')

    steps:
    - name: Security Alert
      uses: sarisia/actions-status-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        title: '🚨 Security Issues Detected'
        description: |
          Security checks have failed. Please review the following:

          - Dependency vulnerabilities
          - CodeQL analysis results
          - License compatibility issues
          - Secret detection results

          Check the Security tab for details.
        color: 0xff0000
        username: Security Bot
        avatar_url: https://github.com/actions.png